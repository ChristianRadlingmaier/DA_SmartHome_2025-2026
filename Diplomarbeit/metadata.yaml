da-kurzfassung-de: >-
  Diese Diplomarbeit beschreibt die Planung, Umsetzung und Bewertung eines
  modularen Smart-Home-Systems auf Basis eines Modellhauses. Ausgangspunkt war
  die Anforderung, typische Funktionen moderner Hausautomation nicht nur
  theoretisch zu erklären, sondern in einer technisch sauberen und
  reproduzierbaren Form praktisch umzusetzen. Im Zentrum stand dabei eine
  klar strukturierte Gesamtarchitektur, die Hardwareanbindung,
  Kommunikationslogik und Bedienoberfläche voneinander trennt. Das Projekt
  wurde als Teamarbeit durchgeführt und in mehrere Teilbereiche gegliedert:
  Modellierung und Verkabelung des Hauses, Integration der Steuerungsplattform
  sowie Aufbau der Automations- und Kommunikationslogik.

  Die technische Umsetzung erfolgte auf einem Raspberry Pi mit
  containerbasiertem Betrieb. Mit Docker Compose wurden Home Assistant, ein
  MQTT-Broker und Portainer bereitgestellt. Node-RED wurde als
  Integrationsschicht eingesetzt, um Datenflüsse zwischen serieller
  Hardwareanbindung, MQTT-Topics und Automationen transparent abzubilden. Für
  die physische I/O-Ebene kam ein Arduino Uno mit StandardFirmata zum Einsatz,
  wodurch Sensor- und Aktorsignale robust in die Softwareebene überführt
  werden konnten. Die Trennung in Feldebene, Verarbeitungsebene und
  Managementebene ermöglichte eine gute Wartbarkeit und vereinfachte
  Fehlersuche, Erweiterung und Dokumentation.

  Im praktischen Betrieb wurden zentrale Use Cases umgesetzt und getestet:
  automatische Lichtsteuerung in Abhängigkeit von Helligkeit und Bewegung,
  kontinuierliche Sensordatenerfassung, manuelle Steuerung über Dashboard
  sowie Rückmeldung von Ist-Zuständen über getrennte MQTT-Command- und
  State-Kanäle. Die Validierung erfolgte anhand definierter Testabläufe und
  zeigte, dass die End-to-End-Kommunikation zwischen Sensorik, Arduino,
  Node-RED, MQTT und Home Assistant stabil und nachvollziehbar funktioniert.
  Typische Fehlerquellen wie serielle Portkonflikte, Rechteprobleme oder
  Verbindungsabbrüche wurden analysiert und durch geeignete Betriebs- und
  Restart-Strategien reduziert.

  Neben den technischen Ergebnissen zeigte das Projekt auch organisatorische
  und methodische Lernerfolge. Die strukturierte Rollenverteilung innerhalb des
  Teams, die laufende Versionsverwaltung sowie die Dokumentation von
  Entscheidungen und Tests erwiesen sich als entscheidend für Termin- und
  Qualitätsziele. Der Modellhausansatz erleichterte die Verknüpfung von
  Theorie und Praxis, weil elektrische, logische und visuelle Aspekte direkt
  beobachtbar waren. Gleichzeitig wurde sichtbar, dass Skalierung in reale
  Umgebungen zusätzliche Anforderungen an Sicherheit, Lasttrennung und
  Betriebsstabilität stellt. Damit liefert die Arbeit nicht nur eine
  funktionierende Demonstration, sondern auch einen klaren methodischen Rahmen
  für den geordneten Ausbau zu umfangreicheren Smart-Home-Szenarien.

  Zusammenfassend wurde das gesetzte Ziel erreicht: Es entstand ein
  funktionsfähiges, modular aufgebautes Smart-Home-Demonstrationssystem, das
  fachliche Grundlagen mit realer technischer Umsetzung verbindet und als
  belastbare Basis für weitere Ausbaustufen dient. Das System ist auf weitere
  Räume, zusätzliche Sensorik und komplexere Automationen übertragbar.
  Gleichzeitig liefert die Arbeit eine strukturierte Dokumentation, die
  Inbetriebnahme, Konfiguration, Test und Weiterentwicklung für nachfolgende
  Projekte deutlich erleichtert.

da-kurzfassung-en: >-
  This diploma thesis presents the planning, implementation, and evaluation of
  a modular smart-home system based on a model house. The starting point was
  the requirement to explain typical functions of modern home automation not
  only in theory, but also in a technically clean and reproducible practical
  setup. The core objective was a clearly structured architecture separating
  hardware access, communication logic, and user interaction. The project was
  executed as team work and divided into sub-areas: house modelling and
  cabling, integration of the central control platform, and implementation of
  automation and communication workflows.

  The technical implementation was realised on a Raspberry Pi with
  container-based operation. Docker Compose was used to deploy Home Assistant,
  an MQTT broker, and Portainer. Node-RED served as the integration layer to
  model and visualise data flows between serial hardware access, MQTT topics,
  and automation logic. For the physical I/O layer, an Arduino Uno running
  StandardFirmata was integrated to reliably transfer sensor and actuator
  signals into the software stack. The separation into field layer, processing
  layer, and management layer improved maintainability and made troubleshooting,
  extension, and documentation significantly easier.

  In practical operation, key use cases were implemented and tested: automatic
  lighting control depending on brightness and motion, continuous sensor data
  acquisition, manual control via dashboard, and feedback of actual states via
  separated MQTT command and state channels. Validation followed defined test
  procedures and showed stable and traceable end-to-end communication between
  sensors, Arduino, Node-RED, MQTT, and Home Assistant. Typical error sources
  such as serial port conflicts, permission issues, or temporary connection
  drops were analysed and mitigated through suitable operating and restart
  strategies.

  Beyond the technical implementation, the project also produced important
  organisational and methodological outcomes. A clear distribution of roles in
  the team, continuous version control, and documented design and test
  decisions were essential for meeting schedule and quality targets. The model
  house approach helped to connect theory and practice because electrical,
  logical, and visual system behaviour could be observed directly. At the same
  time, it became clear that scaling to real residential environments requires
  additional focus on safety, power separation, and long-term operational
  stability. Therefore, the thesis delivers not only a working demonstration,
  but also a structured methodology for extending the solution toward more
  advanced smart-home scenarios.

  In summary, the project goals were achieved: a functional and modular
  smart-home demonstration system was created that connects theoretical
  foundations with real technical implementation and serves as a robust basis
  for further expansion. The architecture can be extended to additional rooms,
  more sensor types, and more complex automation scenarios. At the same time,
  the thesis provides structured documentation that simplifies commissioning,
  configuration, testing, and future development for follow-up projects.


